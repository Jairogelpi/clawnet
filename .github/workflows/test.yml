name: ClawNet Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Run protocol tests
        run: python tests/test_emergence.py
      
      - name: Run real benchmark
        run: python examples/real_benchmark.py
      
      - name: Run systems benchmark
        run: python examples/real_systems_benchmark.py
      
      - name: Import check
        run: |
          python -c "from clawnet import ClawNetClient, ClawNetProtocol"
          python -c "from clawnet.protocol import ContextLockManager, ContextLineage"
          python -c "from clawnet.adapters import LangChainAdapter"
